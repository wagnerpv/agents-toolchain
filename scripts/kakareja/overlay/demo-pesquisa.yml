# Roteiro de demonstração — Funcionalidade de Pesquisa
# Executar: bun run runner.ts demo-pesquisa.yml

demo:
  title: "Demonstração da\nFuncionalidade de Pesquisa"
  page: "../poc1/demo.html"
  out: "/tmp/poc3-out"

steps:
  - intro:
      lines:
        - "Vamos demonstrar como filtrar clientes por nome."
        - "Basta digitar no campo e clicar em Filtrar."

  - wait: 800

  - caption: "Observe a lista completa de clientes..."
  - wait: 3000

  - caption: "Agora vamos digitar um nome no campo de pesquisa."
  - wait: 1500
  - highlight: "#filtro"
  - wait: 800
  - type:
      target: "#filtro"
      text: "Bruno"
  - wait: 2000

  - caption: "Clicando no botão Filtrar..."
  - highlight: "#btn-filtro"
  - wait: 800
  - click: "#btn-filtro"
  - wait: 2500

  - caption: 'Resultado: apenas o cliente "Bruno Barros" é exibido.'
  - wait: 3000

  - reaction: "😎"

  - wait: 1000
  - caption: "É isso! Filtro funcionando perfeitamente."
  - wait: 3000
  - clear_caption
  - wait: 1000
